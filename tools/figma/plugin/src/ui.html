<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>iPod Dev Bridge</title>
		<style>
			:root {
				color-scheme: light dark;
				font-family:
					-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
				font-size: 12px;
			}
			body {
				margin: 0;
				padding: 16px;
				display: flex;
				flex-direction: column;
				gap: 12px;
			}
			h1 {
				margin: 0;
				font-size: 14px;
				font-weight: 600;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 8px;
			}
			.status {
				display: inline-block;
				width: 8px;
				height: 8px;
				border-radius: 50%;
				background: #c8c9cb;
			}
			.status.connected {
				background: #30b66e;
			}
			.status.error {
				background: #e74c3c;
			}
			button {
				font-family: inherit;
				font-size: 12px;
				padding: 6px 10px;
				border-radius: 6px;
				border: 1px solid #c8c9cb;
				background: #fff;
				cursor: pointer;
			}
			button:disabled {
				opacity: 0.5;
				cursor: not-allowed;
			}
			#log {
				max-height: 220px;
				overflow-y: auto;
				font-family: ui-monospace, SFMono-Regular, monospace;
				font-size: 11px;
				background: #f5f5f3;
				border-radius: 6px;
				padding: 8px;
			}
			.log-line {
				padding: 2px 0;
				border-bottom: 1px solid rgba(0, 0, 0, 0.04);
			}
			.log-line.error {
				color: #b3261e;
			}
			.log-line.ok {
				color: #1f6f43;
			}
			input[type="text"] {
				font-family: ui-monospace, monospace;
				padding: 4px 6px;
				border-radius: 4px;
				border: 1px solid #c8c9cb;
				flex: 1;
			}
		</style>
	</head>
	<body>
		<h1>iPod Dev Bridge</h1>
		<div class="row">
			<span id="status" class="status"></span>
			<span id="status-text">Disconnected</span>
			<button id="connect">Connect</button>
		</div>
		<div class="row">
			<input
				id="bind-story"
				type="text"
				placeholder="story-id-for-selected-frame"
			/>
			<button id="bind">Bind</button>
		</div>
		<div class="row">
			<button id="undo">Undo Restore</button>
		</div>
		<div id="log"></div>
		<script src="ui.js"></script>
	</body>
</html>
